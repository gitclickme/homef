<h4>Inputs</h4>
<hr>
<div class="container">
    <div id="budgetFinder">
        <h5>Find</h5>
        <hr>
        <div class="row">
            <div class="col">
                <label class="form-label">Begin Date</label>
                <input type="date" class="form-control form-control-sm form-control-calendar" [formControl]="beginDateForm">
            </div>
            <div class="col">
                <label class="form-label">End Date</label>
                <input type="date" class="form-control form-control-sm form-control-calendar" [formControl]="endDateForm">
            </div>
            <div class="col mt-4">
                <button class="btn btn-sm btn-primary">Find</button>
            </div>
        </div>
    </div>
    <div id="inList" class="mt-4">
        <div class="card">

            <div class="card-header clearfix">
                <div class="row border border-1 p-1 mb-1">
                    <div class="col">
                        <label class="fw-bold">Save Account:</label> &nbsp; <label>  {{account.saving | currency}}</label>
                    </div>
                    <div class="col">
                        <label class="fw-bold">Check Account:</label>  &nbsp; <label>  {{account.checking | currency}}</label>
                    </div>
                    <div class="col">
                      <label class="fw-bold">Balance Account:</label>  &nbsp; <label>  {{account.balance | currency}}</label>
                  </div>

                </div>
                <h4 class="float-start">Inputs List</h4>
                <button class="btn btn-sm btn-primary float-end" (click)="onNewInput()"><i class="bi bi-wallet2"></i> Add </button>
            </div>
            <div class="card-body table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>vendor</th>
                            <th>Date</th>
                            <th>Comment</th>
                            <th class="text-end">Amount</th>
                            <td class="text-end"><button class="btn btn-sm btn-primary" (click)="onNewInput()"><i class="bi bi-wallet2"></i> Add </button></td>
                        </tr>
                    </thead>
                    <tbody>
                      <ng-container *ngIf="show.new">
                      <tr>
                        <td colspan="5">
                          <app-in-detail [in]="newInput" [formType]="show.formType" (formRet)="onFormReturn($event)"></app-in-detail>
                        </td>
                      </tr>

                      </ng-container>
                        <tr class="mouse-pointer" *ngFor="let item of inputList">

                          <ng-container *ngIf="!item.tableManagement.isEditing">
                            <td class="fw-semibold">{{item.vendorName}}</td>
                            <td>{{item.operationDate}}</td>
                            <td>{{item.commentText}}</td>
                            <td class="text-end">{{item.amount|currency}}</td>
                            <td class="text-end"><button class="btn btn-sm btn-primary" (click)="onSelectInput(item.idOperation)"><i class="bi bi-cash-coin"></i></button></td>
                          </ng-container>

                          <ng-container *ngIf="item.tableManagement.isEditing">
                            <td colspan="5">
                              <app-in-detail [in]="item" [formType]="show.formType" (formRet)="onFormReturn($event)"></app-in-detail>
                            </td>
                          </ng-container>
                          </tr>
                      </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" class="fw-semibold">Total</td>
                            <td class="text-end fw-semibold">{{show.total|currency}}</td>
                            <td>&nbsp;</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>


    </div>

</div>
