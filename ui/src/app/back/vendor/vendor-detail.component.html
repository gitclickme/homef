<div id="budgetForm" class="mt-4 border">
  <div class="row m-1" [formGroup]="vendorFormGroup">
      <h5>New Item </h5>
      <div class="col">
          <label class="form-label mouse-pointer"><input type="checkbox" class="mouse-pointer" formControlName="active"> Active</label><br>
          <label class="form-label">Vendor name</label>
          <input type="text" class="form-control form-control-sm " formControlName="vendorName">
      </div>
      <div class="col">
          <label class="form-label">Vendors Type</label>
          <ul class="list-group">
              <li class="list-group-item"><label class="mouse-pointer"><input type="radio" value="1"  formControlName="vendorType"> Input</label></li>
              <li class="list-group-item"><label class="mouse-pointer"><input type="radio" value="2"  formControlName="vendorType" class="mouse-pointer"> OutPut</label></li>
              <li class="list-group-item"><label class="mouse-pointer"><input type="radio" value="3"  formControlName="vendorType" class="mouse-pointer"> Input - Output</label></li>
          </ul>
      </div>
      <div class="clearfix mt-2 mb-2">
        <button class="btn btn-sm btn-secondary float-end me-4" (click)="onCancel()">Cancel</button>
        <button class="btn btn-sm btn-primary me-1 float-end" (click)="onVendorCreate()" *ngIf="show.new" >Create</button>
        <button class="btn btn-sm btn-danger me-1 float-end" (click)="onVendorDelete()" *ngIf="!show.new" >Delete</button>
        <button class="btn btn-sm btn-primary me-1 float-end" (click)="onVendorUpdate()" *ngIf="!show.new" >Update</button>


      </div>

  </div>

</div>
