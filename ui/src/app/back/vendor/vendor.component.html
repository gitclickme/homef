<h4>Vendor</h4>
<hr>
<div class="container">

    <div id="budgetList" class="mt-4">
        <div class="card">
            <div class="card-header clearfix">
                <h4 class="float-start">Vendor List</h4>
                <button class="btn btn-sm btn-primary float-end" (click)="onNewVendor()"><i class="bi bi-person-plus"></i> Add New Vendor</button>
            </div>
            <div class="card-body table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th> Vendors</th>
                            <th> Vendor type</th>
                            <th  class="text-center">Status</th>
                            <td class="float-end"><button class="btn btn-sm btn-primary"><i class="bi bi-person-plus"></i></button></td>
                        </tr>
                    </thead>
                    <tbody>
                        <ng-container *ngIf="show.new">
                          <app-vendor-detail [formType]="show.formType" [vendor]="vendor" (ret)="onVendorFormReturn($event)"></app-vendor-detail>
                        </ng-container>
                        <tr class="mouse-pointer" *ngFor="let item of vendorList">
                          <ng-container *ngIf="!item.tableManagement.isEditing">
                            <td>{{item.vendorName}}</td>
                            <td>{{item.vendorType | vendorType}}</td>
                            <td class="text-center" ><i class="{{item.active | active}}"></i></td>
                            <td class="text-end"><button class="btn btn-sm btn-primary" (click)="onSelectVendor(item.idVendor)"> <i class="bi bi-person-fill-gear"></i> </button></td>
                          </ng-container>

                          <ng-container *ngIf="item.tableManagement.isEditing">
                            <td colspan="4">
                              <app-vendor-detail [formType]="show.formType" [vendor]="item" (ret)="onVendorFormReturn($event)"></app-vendor-detail>
                            </td>
                          </ng-container>

                        </tr>
                    </tbody>
                </table>
            </div>
        </div>


    </div>

</div>
